<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encode-O-Matic 2</title>
  <meta name="theme-color" content="#16213e">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/controls.css">
  <link rel="stylesheet" href="styles/graph.css">
  <link rel="stylesheet" href="styles/data-viewer.css">
  <link rel="stylesheet" href="styles/dialogs.css">
  <link rel="stylesheet" href="styles/feedback.css">
</head>
<body>
  <header class="app-header">
    <div class="app-brand">
      <img class="app-logo" src="assets/logo.svg" alt="">
      <h1 class="app-title">Encode-O-Matic 2</h1>
    </div>
    <div class="toolbar">
      <button id="btn-about" class="btn" type="button">About</button>
      <button id="btn-share" class="btn btn-icon" title="Share current URL" aria-label="Share current URL">🔗</button>
      <div class="session-controls">
        <div class="session-menu">
          <button id="btn-session-menu" class="btn" aria-haspopup="menu" aria-expanded="false">Session ▾</button>
          <div id="session-menu" class="menu-popover" role="menu" hidden>
            <button id="btn-session-save" role="menuitem">Save Session</button>
            <div class="session-load-item">
              <button id="btn-session-load" role="menuitem" aria-haspopup="menu" aria-expanded="false">Load Session ▸</button>
              <div id="session-load-menu" class="menu-popover session-load-menu" role="menu" hidden></div>
            </div>
            <button id="btn-guess" role="menuitem">Guess Encoding</button>
            <div class="menu-sep"></div>
            <button id="btn-clear" class="menu-danger" role="menuitem">Clear</button>
          </div>
        </div>
        <input id="session-name" class="session-name-input" type="text" maxlength="80"
               aria-label="Current session name" title="Current session name" spellcheck="false">
      </div>
      <div class="toolbar-sep"></div>
      <button id="btn-zoom-fit" class="btn" title="Fit graph in view">Fit</button>
      <label class="zoom-control" for="zoom-range">
        Zoom
        <input id="zoom-range" type="range" min="20" max="300" value="100" step="10">
        <output id="zoom-value" for="zoom-range">100%</output>
      </label>
    </div>
  </header>

  <div class="app-body">
    <div class="graph-panel">
      <graph-editor id="graph-editor"></graph-editor>
    </div>
    <aside class="data-panel" id="data-panel" aria-label="Node data views" hidden>
      <div
        class="data-panel-resizer"
        id="data-panel-resizer"
        role="separator"
        aria-label="Resize data pane"
        aria-orientation="vertical"
        tabindex="0"
      ></div>
      <div id="data-view-stack" class="data-view-stack"></div>
    </aside>
  </div>

  <!-- Add Pipe Dialog -->
  <dialog id="add-pipe-dialog" class="dialog" aria-labelledby="add-pipe-dialog-title">
    <form method="dialog" class="dialog-form">
      <h2 id="add-pipe-dialog-title">Add Pipe</h2>
      <div class="pipe-search">
        <input type="search" id="pipe-search-input" placeholder="Search pipes..." autocomplete="off">
      </div>
      <div id="pipe-list" class="pipe-list"></div>
      <div class="dialog-footer">
        <button value="cancel" class="btn">Cancel</button>
      </div>
    </form>
  </dialog>

  <!-- Pipe Config Dialog -->
  <dialog id="config-dialog" class="dialog" aria-labelledby="config-dialog-title">
    <form method="dialog" class="dialog-form">
      <h2 id="config-dialog-title">Configure Pipe</h2>
      <div id="config-fields" class="config-fields"></div>
      <div class="dialog-footer">
        <button id="config-delete-btn" type="button" class="btn btn-danger">Delete Pipe</button>
        <button value="cancel" class="btn">Cancel</button>
        <button value="ok" class="btn btn-primary">OK</button>
      </div>
    </form>
  </dialog>

  <dialog id="guess-dialog" class="dialog" aria-labelledby="guess-dialog-title">
    <form id="guess-form" class="dialog-form">
      <h2 id="guess-dialog-title">Guess Encoding</h2>
      <label class="guess-input-label" for="guess-input">Encoded string</label>
      <textarea id="guess-input" rows="6" required></textarea>
      <footer class="dialog-footer">
        <button id="guess-cancel" type="button" class="btn">Cancel</button>
        <button type="submit" class="btn btn-primary">Guess</button>
      </footer>
    </form>
  </dialog>

  <dialog id="about-dialog" class="dialog">
    <form method="dialog" class="dialog-form">
      <h2>About</h2>
      <div class="about-content">
        <img class="about-logo" src="assets/logo.svg" alt="">
        <div class="about-details">
          <strong class="about-name">Encode-O-Matic 2</strong>
          <span>Version <span id="about-version"></span></span>
          <a href="https://github.com/david-risney/EncodeOMatic2"
             target="_blank" rel="noopener noreferrer">View on GitHub</a>
        </div>
        <div id="update-status" class="update-status" role="status" aria-live="polite">
          Checking for updates…
        </div>
        <button id="btn-update" class="btn btn-primary" type="button" hidden></button>
        <div id="install-status" class="install-status" hidden></div>
      </div>
      <div class="dialog-footer">
        <button value="close" class="btn">Close</button>
      </div>
    </form>
  </dialog>

  <div id="conn-action-popover" class="conn-action-popover" hidden>
    <button data-action="delete" class="btn btn-sm btn-danger">Delete</button>
    <button data-action="add" class="btn btn-sm btn-primary">Add Pipe</button>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <template id="graph-editor-template">
    <div class="graph-canvas">
      <div class="graph-canvas-inner">
        <svg class="connections-layer" width="8000" height="6000" aria-hidden="true"></svg>
        <button class="add-pipe-control" type="button" aria-label="Add Pipe">
          <span aria-hidden="true">+</span><span>Add Pipe</span>
        </button>
      </div>
    </div>
  </template>

  <template id="pipe-node-template">
    <div class="pipe-node">
      <div class="pipe-node-ports-top"></div>
      <div class="pipe-node-header">
        <div class="pipe-node-name-group">
          <span class="pipe-node-error-indicator" role="img" aria-hidden="true" hidden>⚠️</span>
          <span class="pipe-node-name"></span>
        </div>
        <button class="pipe-node-config-btn" type="button" title="Configure" aria-label="Configure pipe">⚙</button>
      </div>
      <div class="pipe-node-ports-bottom"></div>
    </div>
  </template>

  <template id="pipe-text-input-template">
    <div class="pipe-input-area">
      <textarea placeholder="Enter input text…" aria-label="Pipe input text"></textarea>
    </div>
  </template>

  <template id="pipe-file-input-template">
    <div class="pipe-input-area pipe-file-area">
      <div class="pipe-file-name"></div>
      <button class="btn btn-sm" type="button">📁 Choose File</button>
    </div>
  </template>

  <template id="file-input-template">
    <input type="file" hidden>
  </template>

  <template id="port-template">
    <div class="port-wrapper">
      <span class="port-name"></span>
      <button class="port" type="button"></button>
    </div>
  </template>

  <template id="data-viewer-template">
    <div class="data-viewer-inner"></div>
  </template>

  <template id="data-viewer-empty-template">
    <div class="data-viewer-empty"></div>
  </template>

  <template id="data-viewer-editor-template">
    <textarea class="data-viewer-editor"></textarea>
  </template>

  <template id="data-viewer-info-template">
    <div class="data-viewer-info"></div>
  </template>

  <template id="data-view-template">
    <section class="data-view">
      <div class="data-panel-header">
        <span class="data-panel-title"></span>
        <div class="data-panel-controls">
          <button data-action="mode" class="btn btn-sm active" type="button"
                  title="Switch to hex view" aria-label="Text view; switch to hex">Aa</button>
          <button data-action="pin" class="btn btn-sm" type="button"
                  title="Keep this view open" aria-label="Keep this view open" aria-pressed="false">📍</button>
          <button data-action="minimize" class="btn btn-sm" type="button"
                  title="Minimize this view" aria-label="Minimize this view"
                  aria-pressed="false" hidden>_</button>
        </div>
      </div>
      <div class="data-view-errors" role="alert" hidden></div>
      <data-viewer></data-viewer>
    </section>
  </template>

  <template id="data-view-error-template">
    <div class="data-view-error">
      <div class="data-view-error-message"></div>
      <div class="data-view-error-locations" hidden></div>
    </div>
  </template>

  <template id="session-menu-item-template">
    <button type="button" role="menuitem"></button>
  </template>

  <template id="pipe-list-item-template">
    <button class="pipe-list-item" type="button">
      <span class="pipe-list-item-name"></span>
      <span class="pipe-list-item-desc"></span>
    </button>
  </template>

  <template id="config-empty-template">
    <p class="config-empty">This pipe has no configuration.</p>
  </template>

  <template id="config-field-template">
    <div class="config-field">
      <label></label>
      <div class="config-control"></div>
      <div class="field-desc"></div>
    </div>
  </template>

  <template id="config-file-picker-template">
    <div class="config-file-picker">
      <span class="config-file-name"></span>
      <button type="button" class="btn btn-sm">📁 Choose File</button>
    </div>
  </template>

  <template id="toast-template">
    <div class="toast"></div>
  </template>

  <script type="module" src="src/app.js"></script>
</body>
</html>
